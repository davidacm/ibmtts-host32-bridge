name: Release 32-bit DLL

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust (i686-pc-windows-msvc)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: i686-pc-windows-msvc

      - name: Build Release (Library Only)
        run: cargo build --release --lib --target i686-pc-windows-msvc

      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: 'target/i686-pc-windows-msvc/release/ibmtts_host32.dll'

      - name: Create GitHub Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/i686-pc-windows-msvc/release/ibmtts_host32.dll
            target/i686-pc-windows-msvc/release/ibmtts_host32.dll.sha256
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}